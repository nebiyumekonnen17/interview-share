<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Share - Live Hub</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col relative">

    <header class="bg-indigo-600/80 backdrop-blur-md text-white shadow-lg sticky top-0 z-50 border-b border-indigo-500/20">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                    <i class="fa-solid fa-microphone-lines text-amber-400"></i> InterviewShare
                </h1>
                <nav class="hidden sm:flex gap-4 border-l border-indigo-400/50 pl-6 text-sm font-medium">
                    <a href="index.html" class="text-indigo-200 hover:text-white transition-colors"><i class="fa-solid fa-house mr-1"></i> Home</a>
                    <a href="Interview_share.html" class="text-white border-b-2 border-amber-400 pb-1"><i class="fa-solid fa-microphone-lines mr-1"></i> Live Hub</a>
                    <a href="aws-quiz.html" class="text-indigo-200 hover:text-white transition-colors"><i class="fa-solid fa-list-check mr-1"></i> AWS Quiz</a>
                </nav>
            </div>
            <span class="text-sm bg-indigo-700/50 px-3 py-1 rounded-full text-indigo-200 border border-indigo-500/30 font-medium">Connected Hub</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8 flex-grow w-full z-10">
        <section class="md:col-span-1">
            <div class="glass-panel rounded-2xl p-6 shadow-2xl sticky top-24">
                <h2 class="text-lg font-bold mb-1 text-white flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-indigo-400"></i> Share Your Experience
                </h2>
                <p class="text-xs text-slate-400 mb-6">Your recording will be automatically transcribed by Gemini AI and shared instantly.</p>
                
                <form id="shareForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Your Name</label>
                        <input type="text" id="studentName" required placeholder="e.g., Alex Johnson" class="w-full px-3 py-2 glass-input rounded-lg text-sm outline-none transition-all focus:ring-2 focus:ring-indigo-500">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Question / Topic</label>
                        <input type="text" id="interviewTopic" required placeholder="e.g., Behavioral: Leadership" class="w-full px-3 py-2 glass-input rounded-lg text-sm outline-none transition-all focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div class="bg-slate-900/50 p-4 rounded-xl border border-dashed border-slate-700 text-center">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Record Audio</label>
                        <div class="flex justify-center items-center gap-4 mb-3">
                            <button type="button" id="startBtn" class="w-12 h-12 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center transition-transform active:scale-95 shadow-md">
                                <i class="fa-solid fa-microphone text-lg"></i>
                            </button>
                            <button type="button" id="stopBtn" disabled class="w-12 h-12 bg-slate-700 text-slate-500 cursor-not-allowed rounded-full flex items-center justify-center transition-transform active:scale-95 shadow-md">
                                <i class="fa-solid fa-stop text-lg"></i>
                            </button>
                        </div>
                        <div id="recordStatus" class="text-xs font-medium text-slate-400 mb-2 flex items-center justify-center gap-1">Ready to record</div>
                        <audio id="audioPreview" controls class="w-full hidden mt-2 h-8"></audio>
                    </div>

                    <button type="submit" id="submitBtn" disabled class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm shadow-md opacity-50 cursor-not-allowed transition-all">
                        Upload to Live Feed
                    </button>
                </form>
            </div>
        </section>

        <section class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-white flex items-center gap-2 tracking-wide">
                <i class="fa-solid fa-cloud-arrow-down text-indigo-400"></i> Class Activity Feed
            </h2>
            <div id="feedContainer" class="space-y-4">
                <p id="loadingMsg" class="text-sm text-slate-400 italic">Loading shared interviews...</p>
            </div>
        </section>
    </main>

    <footer class="bg-slate-950/90 border-t border-slate-800/60 py-4 text-center z-10 mt-auto">
        <p class="text-xs text-slate-400 tracking-wide font-medium flex items-center justify-center gap-1.5">
            <i class="fa-solid fa-code text-indigo-400"></i> Designed and prepared by 
            <a href="https://www.linkedin.com/in/nebiyumekonnen/" target="_blank" rel="noopener noreferrer" class="text-indigo-300 font-bold hover:text-indigo-200 hover:underline underline-offset-2 transition-all flex items-center gap-1">
                Nebiyu Mekonnen <i class="fa-brands fa-linkedin text-[11px]"></i>
            </a>
        </p>
    </footer>

    <script>
        const SUPABASE_URL = "https://arhyahuaohebaaatjhwn.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_IJgq60oA-0Y9nOr2Mpo8GQ_n3Wlfxgk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Security Layer: Base64 Masked operational key string elements
        const dataBytes = ["QUl6YVN5QllvTjFqRUVXUHNE", "MVphcVBCR29qd0tMMk5iRm5ac2U0"];
        const decryptKey = () => atob(dataBytes[0] + dataBytes[1]);

        let mediaRecorder;
        let audioChunks = [];
        let audioBlob = null;
        
        let timerInterval;
        let secondsElapsed = 0;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordStatus = document.getElementById('recordStatus');
        const audioPreview = document.getElementById('audioPreview');
        const submitBtn = document.getElementById('submitBtn');
        const shareForm = document.getElementById('shareForm');
        const feedContainer = document.getElementById('feedContainer');
        const loadingMsg = document.getElementById('loadingMsg');

        fetchPosts();

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        startBtn.onclick = function() {
            audioChunks = [];
            recordStatus.textContent = 'Requesting mic permission...';
            const constraints = { audio: true, video: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                let options = { mimeType: 'audio/webm;codecs=opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'audio/mp4' }; }
                if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = {}; }

                mediaRecorder = new MediaRecorder(stream, options);
                mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
                
                mediaRecorder.onstop = function() {
                    const currentMime = mediaRecorder.mimeType || 'audio/wav';
                    audioBlob = new Blob(audioChunks, { type: currentMime });
                    audioPreview.src = URL.createObjectURL(audioBlob);
                    audioPreview.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                };
                
                secondsElapsed = 0;
                recordStatus.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-red-500 animate-pulse mr-1"></span> Recording: <span class="font-mono font-bold text-white">${formatTime(secondsElapsed)}</span>`;
                
                timerInterval = setInterval(() => {
                    secondsElapsed++;
                    recordStatus.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-red-500 animate-pulse mr-1"></span> Recording: <span class="font-mono font-bold text-white">${formatTime(secondsElapsed)}</span>`;
                }, 1000);

                mediaRecorder.start();
                startBtn.disabled = true;
                startBtn.classList.add('opacity-50', 'cursor-not-allowed');
                stopBtn.disabled = false;
                stopBtn.className = 'w-12 h-12 bg-slate-800 text-white hover:bg-slate-700 rounded-full flex items-center justify-center shadow-md';
            })
            .catch(err => {
                recordStatus.textContent = 'Error: ' + err.message;
            });
        };

        stopBtn.onclick = function() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                clearInterval(timerInterval);
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                recordStatus.textContent = 'Audio ready!';
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                stopBtn.disabled = true;
                stopBtn.className = 'w-12 h-12 bg-slate-700 text-slate-400 cursor-not-allowed rounded-full flex items-center justify-center';
            }
        };

        async function fetchPosts() {
            try {
                const { data: posts, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
                if (error) return;
                loadingMsg.classList.add('hidden');
                feedContainer.innerHTML = posts.length === 0 ? '<p class="text-sm text-slate-400 italic text-center py-6">No interviews shared yet.</p>' : '';
                
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'glass-panel p-5 rounded-2xl shadow-xl space-y-4';
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-white text-base">${escapeHtml(post.student_name)}</h3>
                                <p class="text-xs text-indigo-300 font-semibold bg-indigo-950/60 border border-indigo-900/50 px-2 py-0.5 rounded-md inline-block mt-1">${escapeHtml(post.topic)}</p>
                            </div>
                            <span class="text-xs text-slate-400 font-medium">${new Date(post.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="audio-container-box p-3 rounded-xl"><audio controls src="${post.audio_url}" class="w-full h-8"></audio></div>
                        <div>
                            <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Transcript</h4>
                            <p class="text-sm text-slate-200 bg-slate-950/40 p-3 rounded-lg border border-slate-800/60 italic leading-relaxed">"${escapeHtml(post.transcript)}"</p>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        shareForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = "Gemini AI Listening & Transcribing...";
            submitBtn.disabled = true;

            const name = document.getElementById('studentName').value;
            const topic = document.getElementById('interviewTopic').value;
            const extension = mediaRecorder && mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
            const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${extension}`;

            try {
                // 1. Upload to Storage Bucket
                const { data: storageData, error: storageError } = await supabaseClient.storage.from('interview-audio').upload(fileName, audioBlob);
                if (storageError) throw storageError;

                const { data: { publicUrl } } = supabaseClient.storage.from('interview-audio').getPublicUrl(fileName);

                // 2. Query Gemini REST API
                const base64Data = await blobToBase64(audioBlob);
                let cleanMimeType = audioBlob.type.split(';')[0].trim();
                if (!cleanMimeType || cleanMimeType === "audio/wav") {
                    cleanMimeType = "audio/webm";
                }

                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${decryptKey()}`;
                
                const response = await fetch(geminiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "You are an expert speech-to-text transcriber. Listen to this recording and transcribe it word-for-word. Return ONLY the transcribed text. Do not add quotes, intro labels, markdown formatting, or summary descriptions." },
                                { 
                                    inlineData: { 
                                        mimeType: cleanMimeType, 
                                        data: base64Data 
                                    } 
                                }
                            ]
                        }]
                    })
                });
                
                const aiResult = await response.json();
                
                if (aiResult.error) {
                    alert("Gemini AI Processing Error: " + aiResult.error.message);
                    submitBtn.textContent = "Upload to Live Feed";
                    submitBtn.disabled = false;
                    return;
                }
                
                const finalizedTranscript = aiResult.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Speech unresolvable.";

                // 3. Save Entry into Database Table Row
                const { error: dbError } = await supabaseClient.from('posts').insert([
                    { student_name: name, topic: topic, audio_url: publicUrl, transcript: finalizedTranscript }
                ]);

                if (dbError) throw dbError;

                shareForm.reset();
                audioPreview.classList.add('hidden');
                recordStatus.textContent = 'Ready to record';
                
                feedContainer.innerHTML = '';
                fetchPosts();
            } catch (err) {
                alert('Process error: ' + err.message);
                console.error(err);
            }
            submitBtn.textContent = "Upload to Live Feed";
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
