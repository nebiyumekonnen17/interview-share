<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Service Wiki | Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .glass-input { background: rgba(15, 23, 42, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="glass-panel border-b border-slate-800 py-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <i class="fa-solid fa-book-open text-indigo-400"></i> AWS Service Wiki
            </h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10 flex-grow">
        <div class="mb-8">
            <input type="text" id="search" placeholder="Search by Service Name..." class="w-full glass-input px-4 py-3 rounded-xl border border-slate-700 bg-slate-900/50">
        </div>

        <div id="wiki-grid" class="grid grid-cols-1 gap-6">
            <p class="text-center text-slate-500 py-10">Loading services...</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-2xl p-8 rounded-3xl border border-slate-700 max-h-[90vh] overflow-y-auto">
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://arhyahuaohebaaatjhwn.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyaHlhaHVhb2hlYmFhYXRqaHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDYyNzgsImV4cCI6MjA5NDY4MjI3OH0.NvRDjDDZcI7u-Go0KnP8dvEyuPWT4ar4hPU6lfc5qIs";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadWiki(query = '') {
            const grid = document.getElementById('wiki-grid');
            let q = sb.from('aws_services').select('*');
            if (query) q = q.ilike('service_name', `%${query}%`);
            
            const { data } = await q;
            grid.innerHTML = data.map(s => `
                <div onclick="showDetails('${s.service_name}')" class="glass-panel p-6 rounded-2xl border-l-4 border-indigo-500 cursor-pointer hover:border-indigo-400 transition-all">
                    <h3 class="text-xl font-bold">${s.service_name}</h3>
                    <p class="text-sm text-slate-300 mt-2">${s.summary}</p>
                </div>`).join('');
        }

        async function showDetails(name) {
            const modal = document.getElementById('modal');
            const cont = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            cont.innerHTML = '<p class="text-center">Asking AI...</p>';
            
            try {
                const { data, error } = await sb.functions.invoke('gemini-proxy', {
                    body: { prompt: `Provide a detailed explanation of AWS ${name} in JSON format: {"explanation": "...", "image": "...", "video_id": "..."}` }
                });

                if (error) throw error;
                
                const responseText = data.candidates[0].content.parts[0].text;
                const info = JSON.parse(responseText.replace(/```json|```/g, ''));
                
                cont.innerHTML = `
                    <h2 class="text-2xl font-bold mb-4">${name}</h2>
                    <img src="${info.image}" class="w-full h-40 object-contain mb-4 rounded-xl">
                    <p class="text-sm mb-4 leading-relaxed">${info.explanation}</p>
                    <iframe class="w-full h-64 rounded-xl" src="https://www.youtube.com/embed/${info.video_id}"></iframe>
                    <button onclick="document.getElementById('modal').classList.add('hidden')" class="mt-6 w-full p-3 bg-indigo-600 rounded-xl font-bold">Close</button>`;
            } catch (e) {
                console.error(e);
                cont.innerHTML = `<p class="text-red-400">Error fetching details. Check your API Key configuration in Supabase.</p>`;
            }
        }

        document.getElementById('search').oninput = (e) => loadWiki(e.target.value);
        loadWiki();
    </script>
</body>
</html>
