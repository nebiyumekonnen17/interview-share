<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner Quiz | Exam Prep Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col relative overflow-y-auto">

    <header class="glass-panel border-b border-slate-800 py-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center w-full">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <i class="fa-brands fa-aws text-amber-500"></i> Exam Prep Hub
            </h1>
            <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-white transition-all">
                <i class="fa-solid fa-arrow-left mr-2"></i> Main Menu
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-4 gap-8 flex-grow w-full relative z-10">
        <aside class="md:col-span-1 space-y-8">
            <div class="glass-panel p-6 rounded-3xl shadow-xl sticky top-24">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-6">Session Stats</h2>
                <div class="space-y-6">
                    <div><p class="text-[10px] text-slate-500 uppercase font-bold">Progress</p><p id="progress-text" class="text-xl font-bold text-white">0 / 0</p></div>
                    <div id="score-container"><p class="text-[10px] text-slate-500 uppercase font-bold">Score</p><p id="score-text" class="text-3xl font-bold text-amber-500">0</p></div>
                </div>
            </div>
        </aside>

        <section class="md:col-span-3 transition-all duration-500">
            <div id="quiz-container" class="glass-panel p-8 rounded-3xl shadow-xl">
                <h2 id="question-text" class="text-2xl font-medium mb-8 text-white leading-relaxed">Loading...</h2>
                <div id="options-container" class="space-y-4"></div>
                <div id="action-area" class="mt-8 hidden">
                    <div id="explanation-box" class="p-6 rounded-xl text-sm mb-6 border border-slate-700 bg-slate-900/50"></div>
                    <button id="next-btn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 rounded-xl text-white font-bold transition-all shadow-lg cursor-pointer">Next Question</button>
                </div>
            </div>
        </section>

        <section id="history-section" class="md:col-span-4">
            <div class="glass-panel p-8 rounded-3xl shadow-xl">
                <h2 class="text-lg font-bold mb-6 text-white">Your Past Sessions</h2>
                <div id="history-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-950/90 border-t border-slate-800/60 py-4 text-center z-10 mt-auto">
        <p class="text-xs text-slate-400 tracking-wide font-medium flex items-center justify-center gap-1.5">
            <i class="fa-solid fa-code text-indigo-400"></i> Designed and prepared by 
            <a href="https://www.linkedin.com/in/nebiyumekonnen/" target="_blank" rel="noopener noreferrer" class="text-indigo-300 font-bold hover:text-indigo-200 hover:underline underline-offset-2 transition-all flex items-center gap-1">
                Nebiyu Mekonnen <i class="fa-brands fa-linkedin text-[11px]"></i>
            </a>
        </p>
    </footer>

    <script>
        const SUPABASE_URL = "https://arhyahuaohebaaatjhwn.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyaHlhaHVhb2hlYmFhYXRqaHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDYyNzgsImV4cCI6MjA5NDY4MjI3OH0.NvRDjDDZcI7u-Go0KnP8dvEyuPWT4ar4hPU6lfc5qIs";
        const GEMINI_API_KEY = "AIzaSyCIK0Yzj2FxzNkx8G-4ZKXHH2iqRYR0_Pc"; // REPLACE WITH YOUR KEY
        window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let questions = [], currentIdx = 0, score = 0;

        async function init() {
            const { data } = await window.sb.from('aws_quiz_questions').select('*');
            questions = (data || []).sort(() => Math.random() - 0.5);
            loadQuestion(); displayHistory();
        }

        function loadQuestion() {
            document.getElementById('action-area').classList.add('hidden');
            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1} of ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            const cont = document.getElementById('options-container'); cont.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-6 py-4 glass-panel rounded-xl hover:bg-slate-700 transition-all text-white font-medium text-sm cursor-pointer border border-slate-700/50";
                btn.innerText = opt; btn.onclick = () => selectAnswer(i, q); cont.appendChild(btn);
            });
        }

        async function selectAnswer(idx, q) {
            const isCorrect = idx === q.correct_answer_index;
            if (isCorrect) score++; document.getElementById('score-text').innerText = score;
            const exp = document.getElementById('explanation-box');
            document.getElementById('action-area').classList.remove('hidden');
            
            if (isCorrect) {
                exp.innerHTML = `<strong class="text-emerald-400">Correct!</strong><br>${q.explanation}`;
            } else {
                getAIExplanation(q, q.options[idx]);
            }
            document.querySelectorAll('#options-container button').forEach(b => { b.disabled = true; b.classList.remove('cursor-pointer'); });
        }

        async function getAIExplanation(q, userAnswer) {
            const exp = document.getElementById('explanation-box');
            exp.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-indigo-400 mr-2"></i> Coaching you...';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Question: "${q.question}". Correct Answer: "${q.options[q.correct_answer_index]}". User chose: "${userAnswer}". Explain clearly why the user's choice is incorrect and clarify the AWS concept.` }] }] })
                });
                const data = await res.json();
                exp.innerHTML = `<div class="text-indigo-300 text-[10px] font-bold uppercase mb-1 border-b border-indigo-500/30 pb-1 mb-2">AI Coach:</div><p class="text-sm">${data.candidates[0].content.parts[0].text}</p>`;
            } catch (err) { exp.innerHTML = `<strong class="text-rose-400">Correction:</strong> ${q.explanation}`; }
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
            const list = document.getElementById('history-list');
            list.innerHTML = [...history].reverse().slice(0, 8).map((s, i) => {
                const isLatest = i === 0;
                return `<div class="glass-panel p-4 rounded-xl text-center flex flex-col justify-between ${isLatest ? 'border-indigo-500 border-2 shadow-[0_0_15px_rgba(99,102,241,0.4)]' : ''}">
                    <p class="text-xs text-slate-400">${s.date}</p>
                    <p class="text-xl font-bold text-amber-400">${s.percentage}%</p>
                </div>`;
            }).join('');
        }

        document.getElementById('next-btn').onclick = () => { currentIdx++; if (currentIdx < questions.length) loadQuestion(); else location.reload(); };
        init();
    </script>
</body>
</html>
