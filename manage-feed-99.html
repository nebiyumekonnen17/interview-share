<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Share - Moderator Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-slate-800 border-b border-slate-700 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-2 text-rose-400">
                <i class="fa-solid fa-shield-halved"></i> Moderator Dashboard
            </h1>
            <span class="text-xs bg-rose-950 text-rose-300 px-3 py-1 rounded-full border border-rose-800 font-semibold uppercase tracking-wider">Admin Mode</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-bold text-white">Submitted Audio Management</h2>
                <p class="text-xs text-slate-400">Review class activities and delete inappropriate or duplicate submissions.</p>
            </div>
            <button id="refreshBtn" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-medium border border-slate-700 flex items-center gap-1 transition-all">
                <i class="fa-solid fa-rotate"></i> Refresh Feed
            </button>
        </div>

        <div id="adminFeedContainer" class="space-y-4">
            <p id="adminLoadingMsg" class="text-sm text-slate-400 italic text-center py-8">Loading shared interviews...</p>
        </div>
    </main>

    <script>
        // CONFIGURATION: Using your verified production URL workspace
        const SUPABASE_URL = "https://arhyahuaohebaaatjhwn.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_IJgq60oA-0Y9nOr2Mpo8GQ_n3Wlfxgk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const adminFeedContainer = document.getElementById('adminFeedContainer');
        const adminLoadingMsg = document.getElementById('adminLoadingMsg');
        const refreshBtn = document.getElementById('refreshBtn');

        window.addEventListener('DOMContentLoaded', fetchAdminPosts);
        refreshBtn.addEventListener('click', fetchAdminPosts);

        // Fetch current live feed entries
        async function fetchAdminPosts() {
            adminLoadingMsg.classList.remove('hidden');
            adminFeedContainer.innerHTML = '';
            
            try {
                const { data: posts, error } = await supabaseClient
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                adminLoadingMsg.classList.add('hidden');
                if (posts.length === 0) {
                    adminFeedContainer.innerHTML = '<p class="text-sm text-slate-500 italic text-center py-8">No posts found in the live database feed.</p>';
                    return;
                }
                
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4 flex flex-col sm:flex-row justify-between sm:items-center gap-4';
                    card.innerHTML = `
                        <div class="space-y-2 flex-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h3 class="font-bold text-white text-base">${escapeHtml(post.student_name)}</h3>
                                <span class="text-[10px] text-indigo-300 font-semibold bg-indigo-950/50 border border-indigo-900 px-2 py-0.5 rounded-md">${escapeHtml(post.topic)}</span>
                            </div>
                            <div class="text-xs text-slate-400 font-mono overflow-x-auto truncate max-w-md bg-slate-900/50 p-1 rounded border border-slate-800">
                                File: ${extractStoragePath(post.audio_url)}
                            </div>
                        </div>
                        <div class="flex items-center gap-3 self-end sm:self-center">
                            <button onclick="deletePost('${post.id}', '${escapeHtml(post.audio_url)}')" class="px-3 py-2 bg-rose-600 hover:bg-rose-700 text-white text-xs font-semibold rounded-lg shadow-md transition-all flex items-center gap-1">
                                <i class="fa-solid fa-trash-can"></i> Delete Post
                            </button>
                        </div>
                    `;
                    adminFeedContainer.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                adminLoadingMsg.textContent = "Failed to synchronize backend content.";
            }
        }

        // Two-part sequential deletion action engine
        async function deletePost(id, fullAudioUrl) {
            const confirmation = confirm("Are you completely sure you want to remove this submission? This action permanently deletes both the text records and the audio asset from cloud hosting.");
            if (!confirmation) return;

            const storageFilePath = extractStoragePath(fullAudioUrl);

            try {
                // Phase 1: Wipe the text row from the public database table
                const { error: dbError } = await supabaseClient
                    .from('posts')
                    .delete()
                    .eq('id', id);

                if (dbError) throw new Error("Database record removal failed: " + dbError.message);

                // Phase 2: Purge the actual file from storage assets if parsed correctly
                if (storageFilePath) {
                    const { error: storageError } = await supabaseClient.storage
                        .from('interview-audio')
                        .remove([storageFilePath]);
                        
                    if (storageError) {
                        console.warn("Storage deletion warning (file may have been manually handled):", storageError.message);
                    }
                }

                alert("Post successfully purged!");
                fetchAdminPosts(); // Reload the feed view layout
            } catch (err) {
                alert(err.message);
                console.error(err);
            }
        }

        // Helper calculation tool to peel the raw filename out of your public streaming URLs
        function extractStoragePath(urlStr) {
            try {
                const parts = urlStr.split('/interview-audio/');
                return parts.length > 1 ? parts[1] : null;
            } catch (e) {
                return null;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
